<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的观赛日历</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2129;
    --panel-2: #222c37;
    --border: #2c3845;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #4c9eeb;
    --wc: #2ecc71;      /* 世界杯 */
    --f1: #e74c3c;      /* F1 */
    --live: #ff5722;
    --added: #2ecc71;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 80px; }

  header h1 { font-size: 22px; font-weight: 700; }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* 视图切换 */
  .views {
    display: flex; gap: 6px; margin: 18px 0 14px;
    background: var(--panel); padding: 5px; border-radius: var(--radius);
  }
  .views button {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: transparent; color: var(--muted); font-size: 14px;
    font-weight: 600; cursor: pointer; transition: .15s;
  }
  .views button.active { background: var(--accent); color: #fff; }
  .views button .badge {
    display: inline-block; min-width: 18px; padding: 0 5px; margin-left: 5px;
    font-size: 11px; background: rgba(255,255,255,.2); border-radius: 9px;
  }

  /* 筛选 */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filters button {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px;
    background: var(--panel); color: var(--muted); font-size: 13px; cursor: pointer;
    transition: .15s;
  }
  .filters button.active { color: var(--text); border-color: var(--accent); background: var(--panel-2); }
  .filters .spacer { flex: 1; }

  /* 日期分组 */
  .day-group { margin-bottom: 22px; }
  .day-head {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
    padding: 6px 2px; margin-bottom: 8px;
    position: sticky; top: 0; background: var(--bg); z-index: 2;
  }

  /* 比赛卡片 */
  .match {
    display: flex; align-items: stretch; gap: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    transition: .15s; position: relative; overflow: hidden;
  }
  .match:hover { border-color: #3a4a5a; }
  .match::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .match.sport-worldcup::before { background: var(--wc); }
  .match.sport-f1::before { background: var(--f1); }

  .match.finished { opacity: .5; }
  .match.live { border-color: var(--live); box-shadow: 0 0 0 1px var(--live); }

  .m-time {
    flex: 0 0 56px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .m-time .hh { font-size: 19px; font-weight: 700; }
  .m-time .tag {
    font-size: 10px; margin-top: 3px; padding: 1px 6px; border-radius: 8px;
    font-weight: 700; white-space: nowrap;
  }
  .tag.wc { background: rgba(46,204,113,.16); color: var(--wc); }
  .tag.f1 { background: rgba(231,76,60,.16); color: var(--f1); }

  .m-body { flex: 1; min-width: 0; cursor: pointer; }
  .m-title { font-size: 15px; font-weight: 600; }
  .m-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .m-meta .dot { margin: 0 6px; opacity: .5; }
  .m-status { font-size: 12px; margin-top: 5px; font-weight: 600; }
  .m-status.live   { color: var(--live); }
  .m-status.soon   { color: var(--accent); }
  .m-status.done   { color: var(--muted); }

  .m-action { flex: 0 0 auto; display: flex; align-items: center; }
  .btn-add {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel-2); color: var(--text); font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .btn-add:hover { border-color: var(--accent); }
  .btn-add.added { background: rgba(46,204,113,.14); border-color: var(--added); color: var(--added); }

  .live-pulse {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--live); margin-right: 5px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .empty {
    text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px;
  }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  /* ===== 月历视图 ===== */
  .cal-month { margin-bottom: 28px; }
  .cal-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-wd {
    text-align: center; font-size: 12px; color: var(--muted);
    font-weight: 700; padding-bottom: 2px;
  }
  .cal-wd.we { color: #d98; }
  .cal-cell {
    min-height: 92px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px; display: flex; flex-direction: column; gap: 3px;
  }
  .cal-cell.blank { background: transparent; border: none; min-height: 0; }
  .cal-cell.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .cal-daynum { font-size: 12px; color: var(--muted); font-weight: 700; }
  .cal-cell.today .cal-daynum { color: var(--accent); }

  .cal-chip {
    font-size: 11px; line-height: 1.3; padding: 3px 5px; border-radius: 5px;
    cursor: pointer; border-left: 3px solid var(--border);
    background: var(--panel-2); transition: .12s; word-break: break-word;
  }
  .cal-chip:hover { background: #2c3a48; }
  .cal-chip.sport-worldcup { border-left-color: var(--wc); }
  .cal-chip.sport-f1 { border-left-color: var(--f1); }
  .cal-chip.finished { opacity: .45; }
  .cal-chip.live {
    border-left-color: var(--live);
    box-shadow: inset 0 0 0 1px var(--live);
  }
  .cal-chip .ct { font-weight: 700; }
  .cal-chip .cl { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--live); margin-right: 3px; animation: pulse 1.2s infinite; }

  @media (max-width: 520px) {
    .cal-grid { gap: 3px; }
    .cal-cell { min-height: 70px; padding: 3px; }
    .cal-chip { font-size: 10px; padding: 2px 3px; }
    .cal-wd { font-size: 11px; }
  }

  @media (max-width: 520px) {
    .match { gap: 8px; padding: 10px; }
    .m-time { flex-basis: 46px; }
    .m-action { width: 100%; }
    .btn-add { font-size: 12px; padding: 7px 9px; }
  }

  /* ===== 淘汰赛对阵更新状态条 ===== */
  .ko-status {
    font-size: 12px; margin-top: 6px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ko-status.loading { color: var(--muted); }
  .ko-status.ok      { color: var(--wc); }
  .ko-status.stale   { color: #e0a33e; }

  /* 占位对阵（tbd=true）：浅色 + 斜体 */
  .m-title.tbd { font-style: italic; color: var(--muted); font-weight: 500; }
  .cal-chip.tbd .ct + * , .cal-chip.tbd { font-style: italic; }
  .cal-chip.tbd { opacity: .85; }

  /* 导出 .ics 按钮（放在筛选行最右） */
  #exportIcs { white-space: nowrap; }
  #exportIcs:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚽🏎️ 我的观赛日历</h1>
    <div class="sub">时间已按 <strong id="tzLabel">Europe/Amsterdam</strong> 时区显示</div>
    <div class="ko-status loading" id="koStatus">淘汰赛对阵加载中…</div>
  </header>

  <div class="views">
    <button data-view="all" class="active">全部赛程</button>
    <button data-view="mine">我的日历 <span class="badge" id="mineCount">0</span></button>
  </div>

  <div class="filters" id="filters">
    <button data-filter="all" class="active">全部</button>
    <button data-filter="worldcup">世界杯</button>
    <button data-filter="f1">F1</button>
    <button data-filter="knockout">只看淘汰赛</button>
    <span class="spacer"></span>
    <button id="exportIcs" type="button">⬇ 导出 .ics</button>
  </div>

  <div id="list"></div>
</div>

<!-- 赛程数据池：通过 script 标签引入，避免 file:// 下 fetch 被拦截 -->
<script src="fixtures.js"></script>
<script>
(function () {
  "use strict";

  // ===== 配置 =====
  var TZ = "Europe/Amsterdam";
  var STORAGE_KEY = "myWatchCalendar.selectedIds";
  var SPORT_LABEL = { worldcup: "世界杯", f1: "F1" };

  // 淘汰赛接口（同源，前端不需要任何 key、也没有 CORS 问题）
  var KO_ENDPOINT = "/api/knockout";
  var KO_TIMEOUT = 5000;                         // fetch 超时 5 秒
  var KO_CACHE_KEY = "myWatchCalendar.knockoutCache.v1";

  // ===== 状态 =====
  var state = {
    view: "all",        // all | mine
    filter: "all",      // all | worldcup | f1 | knockout
    selected: loadSelected()
  };

  // 淘汰赛数据（来自 /api/knockout，归一化后并入渲染）；首屏为空，不阻塞小组赛/F1
  var knockoutFixtures = [];
  function allData() { return allFixtures.concat(knockoutFixtures); }

  // ===== localStorage =====
  function loadSelected() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      return new Set(Array.isArray(arr) ? arr : []);
    } catch (e) { return new Set(); }
  }
  function saveSelected() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(state.selected)));
    } catch (e) { /* 隐私模式等情况下静默失败 */ }
  }

  // ===== 时间格式化（用 Intl 做时区换算，不硬编码时差）=====
  var fmtDay = new Intl.DateTimeFormat("zh-CN", {
    timeZone: TZ, weekday: "short", year: "numeric", month: "long", day: "numeric"
  });
  var fmtDayKey = new Intl.DateTimeFormat("en-CA", {
    timeZone: TZ, year: "numeric", month: "2-digit", day: "2-digit"
  });
  var fmtTime = new Intl.DateTimeFormat("nl-NL", {
    timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
  });

  function dayKey(d)  { return fmtDayKey.format(d); }     // 用于分组排序，如 2026-06-11
  function dayLabel(d){ return fmtDay.format(d); }
  function timeLabel(d){ return fmtTime.format(d); }

  // 比赛状态：默认时长用于判断"进行中"
  var DURATION_MIN = { worldcup: 115, f1: 130 };
  function matchStatus(fx, now) {
    var start = new Date(fx.datetimeUTC).getTime();
    var end = start + (DURATION_MIN[fx.sport] || 120) * 60000;
    var t = now.getTime();
    if (t >= end) return "finished";
    if (t >= start) return "live";
    return "upcoming";
  }

  // 倒计时文案
  function countdownText(start, now) {
    var ms = start - now.getTime();
    if (ms <= 0) return "";
    var mins = Math.floor(ms / 60000);
    var d = Math.floor(mins / 1440);
    var h = Math.floor((mins % 1440) / 60);
    var m = mins % 60;
    if (d > 0) return d + " 天 " + h + " 小时后";
    if (h > 0) return h + " 小时 " + m + " 分钟后";
    return m + " 分钟后";
  }

  // ===== 渲染 =====
  var listEl = document.getElementById("list");
  var mineCountEl = document.getElementById("mineCount");

  function visibleFixtures() {
    var arr = allData();
    if (state.view === "mine") {
      arr = arr.filter(function (f) { return state.selected.has(f.id); });
    }
    if (state.filter === "knockout") {
      arr = arr.filter(function (f) { return f.knockout; });
    } else if (state.filter !== "all") {
      arr = arr.filter(function (f) { return f.sport === state.filter; });
    }
    arr.sort(function (a, b) {
      return new Date(a.datetimeUTC) - new Date(b.datetimeUTC);
    });
    return arr;
  }

  function render() {
    var now = new Date();
    mineCountEl.textContent = state.selected.size;

    if (state.view === "mine") {
      renderCalendar(now);
      return;
    }

    var fixtures = visibleFixtures();
    listEl.innerHTML = "";

    if (fixtures.length === 0) {
      listEl.appendChild(emptyState());
      return;
    }

    // 按日期分组（分组键基于显示时区）
    var groups = [];
    var index = {};
    fixtures.forEach(function (fx) {
      var d = new Date(fx.datetimeUTC);
      var key = dayKey(d);
      if (!(key in index)) {
        index[key] = groups.length;
        groups.push({ key: key, date: d, items: [] });
      }
      groups[index[key]].items.push(fx);
    });

    groups.forEach(function (g) {
      var wrap = document.createElement("div");
      wrap.className = "day-group";

      var head = document.createElement("div");
      head.className = "day-head";
      head.textContent = dayLabel(g.date);
      wrap.appendChild(head);

      g.items.forEach(function (fx) {
        wrap.appendChild(matchCard(fx, now));
      });
      listEl.appendChild(wrap);
    });
  }

  function emptyState() {
    var el = document.createElement("div");
    el.className = "empty";
    if (state.view === "mine") {
      el.innerHTML = '<div class="big">📭</div>还没有加入任何比赛。<br>去「全部赛程」点 ＋ 把想看的加进来吧！';
    } else {
      el.innerHTML = '<div class="big">🔍</div>当前筛选下没有比赛。';
    }
    return el;
  }

  function matchCard(fx, now) {
    var d = new Date(fx.datetimeUTC);
    var status = matchStatus(fx, now);
    var added = state.selected.has(fx.id);

    var card = document.createElement("div");
    card.className = "match sport-" + fx.sport +
      (status === "finished" ? " finished" : "") +
      (status === "live" ? " live" : "");

    // 时间列
    var timeCol = document.createElement("div");
    timeCol.className = "m-time";
    var sportCls = fx.sport === "f1" ? "f1" : "wc";
    timeCol.innerHTML =
      '<div class="hh">' + timeLabel(d) + '</div>' +
      '<div class="tag ' + sportCls + '">' + (SPORT_LABEL[fx.sport] || fx.sport) + '</div>';
    card.appendChild(timeCol);

    // 主体（点击打开直播）
    var body = document.createElement("div");
    body.className = "m-body";
    body.title = "点击在新标签页打开直播：" + fx.platform;

    var meta = [fx.stage, fx.venue].filter(Boolean).join('<span class="dot">·</span>');
    var statusHtml = "";
    if (status === "live") {
      statusHtml = '<div class="m-status live"><span class="live-pulse"></span>正在直播中</div>';
    } else if (status === "finished") {
      statusHtml = '<div class="m-status done">已结束</div>';
    } else {
      statusHtml = '<div class="m-status soon">⏳ ' + countdownText(d.getTime(), now) + '</div>';
    }

    body.innerHTML =
      '<div class="m-title' + (fx.tbd ? ' tbd' : '') + '">' + escapeHtml(fx.title) + '</div>' +
      '<div class="m-meta">' + meta + '<span class="dot">·</span>' + escapeHtml(fx.platform) + '</div>' +
      statusHtml;

    body.addEventListener("click", function () {
      window.open(fx.streamUrl, "_blank", "noopener");
    });
    card.appendChild(body);

    // 加入/移除按钮
    var actionCol = document.createElement("div");
    actionCol.className = "m-action";
    var btn = document.createElement("button");
    btn.className = "btn-add" + (added ? " added" : "");
    btn.textContent = added ? "✓ 已加入" : "＋ 加入我的日历";
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      toggleSelect(fx.id);
    });
    actionCol.appendChild(btn);
    card.appendChild(actionCol);

    return card;
  }

  function toggleSelect(id) {
    if (state.selected.has(id)) state.selected.delete(id);
    else state.selected.add(id);
    saveSelected();
    render();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ===== 月历视图（我的日历）=====
  var WEEKDAYS = ["一", "二", "三", "四", "五", "六", "日"]; // 周一起头

  function renderCalendar(now) {
    listEl.innerHTML = "";

    // 取出我选中的比赛（受运动类型筛选影响），按显示时区的日期归档
    var fixtures = visibleFixtures(); // view=mine 已过滤 selected + filter
    if (fixtures.length === 0) {
      listEl.appendChild(emptyState());
      return;
    }

    // dayKey(YYYY-MM-DD, 基于 Europe/Amsterdam) -> 当天比赛列表
    var byDay = {};
    fixtures.forEach(function (fx) {
      var key = dayKey(new Date(fx.datetimeUTC));
      (byDay[key] || (byDay[key] = [])).push(fx);
    });

    // 找出涉及的月份（YYYY-MM），按时间顺序逐月渲染
    var months = [];
    var seen = {};
    Object.keys(byDay).sort().forEach(function (k) {
      var ym = k.slice(0, 7);
      if (!seen[ym]) { seen[ym] = true; months.push(ym); }
    });

    var todayKey = dayKey(now);
    months.forEach(function (ym) {
      listEl.appendChild(monthGrid(ym, byDay, todayKey, now));
    });
  }

  function monthGrid(ym, byDay, todayKey, now) {
    var parts = ym.split("-");
    var year = parseInt(parts[0], 10);
    var month = parseInt(parts[1], 10); // 1-12

    var wrap = document.createElement("div");
    wrap.className = "cal-month";

    var title = document.createElement("div");
    title.className = "cal-title";
    title.textContent = year + " 年 " + month + " 月";
    wrap.appendChild(title);

    var grid = document.createElement("div");
    grid.className = "cal-grid";

    // 星期表头
    WEEKDAYS.forEach(function (w, i) {
      var wd = document.createElement("div");
      wd.className = "cal-wd" + (i >= 5 ? " we" : "");
      wd.textContent = w;
      grid.appendChild(wd);
    });

    // 该月天数 & 1 号是周几（日历日期的星期与时区无关，用 UTC 计算）
    var daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
    var firstDow = new Date(Date.UTC(year, month - 1, 1)).getUTCDay(); // 0=周日
    var offset = (firstDow + 6) % 7; // 转成周一起头的前导空格数

    for (var b = 0; b < offset; b++) {
      var blank = document.createElement("div");
      blank.className = "cal-cell blank";
      grid.appendChild(blank);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var key = year + "-" + pad2(month) + "-" + pad2(d);
      var cell = document.createElement("div");
      cell.className = "cal-cell" + (key === todayKey ? " today" : "");

      var num = document.createElement("div");
      num.className = "cal-daynum";
      num.textContent = d;
      cell.appendChild(num);

      var items = byDay[key];
      if (items) {
        items.sort(function (a, b) { return new Date(a.datetimeUTC) - new Date(b.datetimeUTC); });
        items.forEach(function (fx) { cell.appendChild(calChip(fx, now)); });
      }
      grid.appendChild(cell);
    }

    wrap.appendChild(grid);
    return wrap;
  }

  function pad2(n) { return n < 10 ? "0" + n : "" + n; }

  function calChip(fx, now) {
    var d = new Date(fx.datetimeUTC);
    var status = matchStatus(fx, now);
    var chip = document.createElement("div");
    chip.className = "cal-chip sport-" + fx.sport +
      (fx.tbd ? " tbd" : "") +
      (status === "finished" ? " finished" : "") +
      (status === "live" ? " live" : "");
    chip.title = (status === "finished" ? "已结束 · " : status === "live" ? "直播中 · " : "") +
      fx.title + " · 点击打开直播（" + fx.platform + "）";

    var liveDot = status === "live" ? '<span class="cl"></span>' : "";
    chip.innerHTML =
      '<span class="ct">' + liveDot + timeLabel(d) + '</span> ' +
      escapeHtml(fx.title);

    chip.addEventListener("click", function () {
      window.open(fx.streamUrl, "_blank", "noopener");
    });
    return chip;
  }

  // ===== 淘汰赛：拉取 /api/knockout，归一化并入数据池 =====
  // 把接口返回的一条记录，转成本应用 fixture 通用结构
  function normalizeKnockout(item) {
    var tbd = !!item.tbd || !item.home || !item.away;
    var matchup = (!tbd && item.home && item.away)
      ? (item.home + " vs " + item.away)
      : (item.bracketSlot || "对阵待定");   // 占位：优先 bracketSlot，否则"待定"
    return {
      id: item.id || ("ko-" + item.stage + "-" + item.datetimeUTC),
      sport: "worldcup",
      knockout: true,                       // 供"只看淘汰赛"筛选
      tbd: tbd,                             // 供占位浅色/斜体样式
      bracketSlot: item.bracketSlot || null,
      home: item.home || null,
      away: item.away || null,
      title: matchup,
      stage: item.stage,
      datetimeUTC: item.datetimeUTC,
      venue: item.venue || "",
      platform: item.platform || "NOS",
      streamUrl: item.streamUrl || "https://nos.nl/live"
    };
  }

  function setKoStatus(text, cls) {
    var el = document.getElementById("koStatus");
    if (!el) return;
    el.textContent = text;
    el.className = "ko-status " + (cls || "");
  }

  function applyKnockout(rawArr) {
    knockoutFixtures = (rawArr || []).map(normalizeKnockout);
    render();
  }

  // 失败/超时 → 用 localStorage 上次缓存渲染
  function useKnockoutCache() {
    try {
      var raw = localStorage.getItem(KO_CACHE_KEY);
      if (raw) {
        var obj = JSON.parse(raw);
        if (obj && Array.isArray(obj.data)) {
          applyKnockout(obj.data);
          setKoStatus("⚠ 更新失败，用缓存（" + timeLabel(new Date(obj.savedAt)) + "）", "stale");
          return;
        }
      }
    } catch (e) { /* ignore */ }
    setKoStatus("⚠ 淘汰赛对阵暂不可用", "stale");
  }

  function fetchKnockout() {
    setKoStatus("淘汰赛对阵加载中…", "loading");

    // 5 秒超时（中止 fetch 会走到下面的 catch）
    var controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var timer = setTimeout(function () {
      if (controller) controller.abort();
    }, KO_TIMEOUT);

    fetch(KO_ENDPOINT, controller ? { signal: controller.signal } : undefined)
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (arr) {
        clearTimeout(timer);
        if (!Array.isArray(arr)) throw new Error("返回结构异常");
        applyKnockout(arr);                                // 成功 → 渲染淘汰赛
        try {                                              // 存 localStorage 缓存
          localStorage.setItem(KO_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), data: arr }));
        } catch (e) { /* 隐私模式等静默失败 */ }
        setKoStatus("对阵更新于 " + timeLabel(new Date()), "ok");
      })
      .catch(function () {
        clearTimeout(timer);
        useKnockoutCache();                                // 失败/超时 → 用缓存
      });
  }

  // ===== 导出 .ics（导出"我的日历"已选中的全部比赛，含 tbd 淘汰赛）=====
  function toICSDate(d) {
    return d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate()) + "T" +
           pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + "Z";
  }
  function icsEscape(s) {
    return String(s == null ? "" : s)
      .replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
  }
  function exportICS() {
    var chosen = allData().filter(function (f) { return state.selected.has(f.id); });
    if (!chosen.length) { alert("还没有加入任何比赛。先去「全部赛程」点 ＋ 加入。"); return; }
    chosen.sort(function (a, b) { return new Date(a.datetimeUTC) - new Date(b.datetimeUTC); });

    var lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0",
      "PRODID:-//WK-Calendar//ZH-CN//", "CALSCALE:GREGORIAN", "METHOD:PUBLISH"
    ];
    var stamp = toICSDate(new Date());
    chosen.forEach(function (f) {
      var start = new Date(f.datetimeUTC);
      var end = new Date(start.getTime() + (DURATION_MIN[f.sport] || 120) * 60000);
      var icon = f.sport === "f1" ? "🏎️ " : "⚽ ";
      lines.push(
        "BEGIN:VEVENT",
        "UID:" + f.id + "@wk-calendar",
        "DTSTAMP:" + stamp,
        "DTSTART:" + toICSDate(start),
        "DTEND:" + toICSDate(end),
        "SUMMARY:" + icsEscape(icon + f.title),
        "LOCATION:" + icsEscape(f.venue),
        "DESCRIPTION:" + icsEscape([f.stage, f.platform, f.streamUrl].filter(Boolean).join(" · ")),
        "URL:" + icsEscape(f.streamUrl),
        "END:VEVENT"
      );
    });
    lines.push("END:VCALENDAR");

    var blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "我的观赛日历.ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  // ===== 事件绑定 =====
  document.getElementById("exportIcs").addEventListener("click", exportICS);
  document.querySelectorAll(".views button").forEach(function (b) {
    b.addEventListener("click", function () {
      state.view = b.getAttribute("data-view");
      document.querySelectorAll(".views button").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active");
      render();
    });
  });
  document.querySelectorAll("#filters button[data-filter]").forEach(function (b) {
    b.addEventListener("click", function () {
      state.filter = b.getAttribute("data-filter");
      document.querySelectorAll("#filters button[data-filter]").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active");
      render();
    });
  });

  // 时区标签显示
  document.getElementById("tzLabel").textContent = TZ;

  // 首屏：立即用 fixtures.js 渲染小组赛 + F1，不等网络
  render();
  // 再异步拉取淘汰赛对阵（成功则并入并重渲染）
  fetchKnockout();
  // 每分钟刷新状态/倒计时
  setInterval(render, 60000);
})();
</script>
</body>
</html>
